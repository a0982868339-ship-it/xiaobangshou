# Mobile User App
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile-user
  labels:
    app: mobile-user
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mobile-user
  template:
    metadata:
      labels:
        app: mobile-user
    spec:
      containers:
      - name: mobile-user
        image: xiaobangshou-mobile-user:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mobile-user
spec:
  selector:
    app: mobile-user
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer

